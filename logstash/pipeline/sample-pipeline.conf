input {
  # Beats input for Filebeat, Metricbeat, etc.
  beats {
    port => 5044
  }

  # TCP input for log shipping
  tcp {
    port => 5000
    codec => json_lines
  }

  # HTTP input for webhooks
  http {
    port => 8080
    codec => json
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
    }
  }

  # Add environment metadata
  mutate {
    add_field => {
      "[@metadata][stage]" => "production"
      "[@metadata][pipeline]" => "main"
    }
  }

  # Parse timestamps
  date {
    match => ["timestamp", "ISO8601", "UNIX"]
    target => "@timestamp"
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logstash-%{+YYYY.MM.dd}"
    user => ""
    password => ""
  }

  # Debug output (disable in production)
  stdout {
    codec => rubydebug
  }
}
